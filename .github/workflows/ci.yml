name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting + clippy, denying all warnings.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  # Build + full test suite on the two Rust release channels:
  #   stable = what users build with today; beta = next release, for early warning.
  test:
    name: Test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo build --release --verbose
      - run: cargo test --verbose

  # Same suite on a big-endian host (IBM Z / s390x) under QEMU, proving the
  # little-endian wire format round-trips correctly off little-endian hardware.
  test-big-endian:
    name: Test (big-endian, s390x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust
      - uses: taiki-e/install-action@cross
      - run: cross test --target s390x-unknown-linux-gnu --verbose

  # Line coverage via llvm-cov; publishes the README's coverage badge from main.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the badge JSON to the `badges` branch
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Measure coverage
        run: |
          cargo llvm-cov --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only --json --output-path coverage.json
          PCT=$(jq '.data[0].totals.lines.percent' coverage.json)
          printf 'line coverage: %.1f%%\n' "$PCT"
          echo "COVERAGE_PCT=$PCT" >> "$GITHUB_ENV"

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/publish-coverage-badge.sh
